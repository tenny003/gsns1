<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>제휴 문의 | GSNS 랭킹</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="shortcut icon" href="/favicon.svg" />
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}

:root{
  --bg:#0f172a;
  --header-bg:#111827;
  --text:#e2e8f0;
  --sub:#94a3b8;
  --control-bg:#1e293b;
  --control-color:#ffffff;
  --footer-color:#94a3b8;
  --toggle-bg:#475569;
  --toggle-color:#f8fafc;
}
body.light{
  --bg:#f1f5f9;
  --header-bg:#ffffff;
  --text:#1e293b;
  --sub:#64748b;
  --control-bg:#e2e8f0;
  --control-color:#1e293b;
  --footer-color:#64748b;
  --toggle-bg:#e2e8f0;
  --toggle-color:#1e293b;
}

body{background:var(--bg);color:var(--text);transition:background .3s,color .3s;min-height:100vh;}

/* 헤더 */
header{
  padding:28px 40px;background:var(--header-bg);
  position:sticky;top:0;z-index:10;
  box-shadow:0 2px 10px rgba(0,0,0,.15);
  display:flex;align-items:center;justify-content:space-between;
  transition:background .3s;
}
.header-left{display:flex;align-items:center;gap:16px;}
.back-btn{
  display:flex;align-items:center;gap:6px;
  padding:8px 16px;border-radius:50px;border:none;
  background:var(--control-bg);color:var(--control-color);
  font-size:.85rem;font-weight:600;cursor:pointer;
  transition:background .3s,color .3s,opacity .2s;
}
.back-btn:hover{opacity:.75;}
.logo-link{text-decoration:none;color:var(--text);}
.logo-link h1{font-size:1.8rem;}

/* 테마 토글 */
.theme-toggle{display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;}
.toggle-icon{font-size:1.2rem;transition:transform .4s;}
.toggle-track{
  width:54px;height:28px;background:#475569;
  border-radius:50px;position:relative;
  transition:background .3s;box-shadow:inset 0 2px 6px rgba(0,0,0,.3);
}
.toggle-thumb{
  position:absolute;top:3px;left:3px;
  width:22px;height:22px;background:#fff;border-radius:50%;
  transition:transform .3s cubic-bezier(.4,0,.2,1);
  box-shadow:0 2px 6px rgba(0,0,0,.35);
}
body.light .toggle-track{background:#38bdf8;}
body.light .toggle-thumb{transform:translateX(26px);}
body.light .toggle-icon{transform:rotate(20deg);}
.toggle-label{font-size:.85rem;font-weight:700;letter-spacing:.05em;color:var(--toggle-color);text-transform:uppercase;transition:color .3s;min-width:72px;}

/* 히어로 */
.hero{
  text-align:center;padding:70px 20px 50px;
  background:linear-gradient(180deg,var(--header-bg),var(--bg));
  transition:background .3s;
}
.hero-badge{
  display:inline-block;padding:6px 18px;border-radius:50px;
  background:rgba(56,189,248,.15);color:#38bdf8;
  font-size:.8rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  margin-bottom:20px;border:1px solid rgba(56,189,248,.3);
}
.hero h2{font-size:2.6rem;font-weight:800;margin-bottom:16px;line-height:1.25;}
.hero p{color:var(--sub);font-size:1.05rem;max-width:520px;margin:0 auto;}

/* 폼 카드 */
.form-wrapper{max-width:760px;margin:0 auto;padding:0 30px 80px;}
.form-card{
  background:var(--header-bg);border-radius:24px;
  padding:48px;box-shadow:0 20px 60px rgba(0,0,0,.25);
  transition:background .3s;
}
.contact-form{display:flex;flex-direction:column;gap:22px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
@media(max-width:600px){.form-row{grid-template-columns:1fr;} .form-card{padding:30px 20px;} .hero h2{font-size:1.8rem;}}
.form-group{display:flex;flex-direction:column;gap:8px;}
.form-group label{font-size:.8rem;font-weight:700;color:var(--sub);letter-spacing:.06em;text-transform:uppercase;}
.contact-form input,
.contact-form select,
.contact-form textarea{
  padding:14px 16px;border-radius:12px;
  border:1.5px solid transparent;
  background:var(--control-bg);color:var(--control-color);
  font-size:.95rem;transition:border-color .2s,background .3s;
  outline:none;resize:vertical;
}
.contact-form input:focus,
.contact-form select:focus,
.contact-form textarea:focus{border-color:#38bdf8;}
.submit-btn{
  padding:15px 40px;border-radius:50px;border:none;
  background:linear-gradient(135deg,#38bdf8,#2563eb);
  color:#fff;font-size:1rem;font-weight:700;
  cursor:pointer;letter-spacing:.03em;align-self:flex-start;
  transition:opacity .2s,transform .2s;
  box-shadow:0 4px 24px rgba(56,189,248,.4);
}
.submit-btn:hover{opacity:.85;transform:translateY(-2px);}

footer{text-align:center;padding:30px;color:var(--footer-color);}
</style>
</head>
<body>
<header>
  <div class="header-left">
    <button class="back-btn" onclick="location.href='index.html'">← Back</button>
    <a class="logo-link" href="index.html"><h1>🎮 GSNS</h1></a>
  </div>
  <div class="theme-toggle" onclick="toggleTheme()">
    <span class="toggle-icon" id="toggleIcon">🌙</span>
    <div class="toggle-track"><div class="toggle-thumb"></div></div>
    <span class="toggle-label" id="themeBtn">Dark Mode</span>
  </div>
</header>

<div class="hero">
  <div class="hero-badge">Partnership</div>
  <h2>함께 성장할 파트너를<br>기다립니다</h2>
  <p>게임사, 브랜드, 콘텐츠 크리에이터 등 다양한 제휴 문의를 환영합니다.</p>
</div>

<div class="form-wrapper">
  <div class="form-card">
    <form class="contact-form" action="https://formspree.io/f/xzdorzoj" method="POST">
      <div class="form-row">
        <div class="form-group">
          <label>이름 / Name</label>
          <input type="text" name="name" placeholder="홍길동" required />
        </div>
        <div class="form-group">
          <label>이메일 / Email</label>
          <input type="email" name="email" placeholder="example@email.com" required />
        </div>
      </div>
      <div class="form-group">
        <label>회사명 / Company</label>
        <input type="text" name="company" placeholder="회사명을 입력해주세요" />
      </div>
      <div class="form-group">
        <label>문의 유형 / Type</label>
        <select name="type">
          <option value="게임사 제휴">게임사 제휴</option>
          <option value="광고 문의">광고 문의</option>
          <option value="콘텐츠 협업">콘텐츠 협업</option>
          <option value="기타">기타</option>
        </select>
      </div>
      <div class="form-group">
        <label>문의 내용 / Message</label>
        <textarea name="message" rows="6" placeholder="문의 내용을 자유롭게 작성해주세요." required></textarea>
      </div>
      <button type="submit" class="submit-btn">문의 보내기 →</button>
    </form>
  </div>
</div>

<footer>
  <p>© 2026 GSNS - Game Social Network Service</p>
</footer>

<script>
function toggleTheme(){
  const body = document.body;
  body.classList.toggle('light');
  const isLight = body.classList.contains('light');
  document.getElementById('toggleIcon').textContent = isLight ? '☀️' : '🌙';
  document.getElementById('themeBtn').textContent = isLight ? 'Light Mode' : 'Dark Mode';
  localStorage.setItem('theme', isLight ? 'light' : 'dark');
}
window.onload = () => {
  const saved = localStorage.getItem('theme');
  if(saved === 'light'){
    document.body.classList.add('light');
    document.getElementById('toggleIcon').textContent = '☀️';
    document.getElementById('themeBtn').textContent = 'Light Mode';
  }
};
</script>
</body>
</html>
