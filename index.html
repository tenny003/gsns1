<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GSNS - Game Ranking Platform</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}

:root{
  --bg:#0f172a;
  --header-bg:#111827;
  --text:#e2e8f0;
  --sub:#94a3b8;
  --control-bg:#1e293b;
  --control-color:#ffffff;
  --card-bg:linear-gradient(180deg,#1e293b,#111827);
  --card-shadow:rgba(0,0,0,.35);
  --rank-color:#38bdf8;
  --tag-bg:#2563eb;
  --footer-color:#94a3b8;
  --toggle-color:#f8fafc;
}
body.light{
  --bg:#f1f5f9;
  --header-bg:#ffffff;
  --text:#1e293b;
  --sub:#64748b;
  --control-bg:#e2e8f0;
  --control-color:#1e293b;
  --card-bg:linear-gradient(180deg,#ffffff,#f1f5f9);
  --card-shadow:rgba(0,0,0,.10);
  --rank-color:#2563eb;
  --tag-bg:#3b82f6;
  --footer-color:#64748b;
  --toggle-color:#1e293b;
}

body{background:var(--bg);color:var(--text);transition:background .3s,color .3s;}

/* 헤더 */
header{
  padding:28px 40px;text-align:center;
  background:var(--header-bg);position:sticky;top:0;z-index:10;
  transition:background .3s;box-shadow:0 2px 10px rgba(0,0,0,.15);
  position:relative;
}
h1{font-size:2.5rem;}
.sub{color:var(--sub);margin-top:10px;}

.nav-btn{
  position:absolute;left:30px;top:50%;transform:translateY(-50%);
  padding:10px 22px;border-radius:50px;border:none;
  background:linear-gradient(135deg,#38bdf8,#2563eb);
  color:#fff;font-size:.85rem;font-weight:700;
  cursor:pointer;letter-spacing:.04em;
  transition:opacity .2s,transform .2s;
  box-shadow:0 4px 16px rgba(56,189,248,.35);
  text-decoration:none;display:flex;align-items:center;gap:6px;
}
.nav-btn:hover{opacity:.85;transform:translateY(calc(-50% - 2px));}

/* 테마 토글 */
.theme-toggle{
  position:absolute;right:30px;top:50%;transform:translateY(-50%);
  display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;
}
.toggle-icon{font-size:1.2rem;transition:transform .4s;}
.toggle-track{
  width:54px;height:28px;background:#475569;border-radius:50px;
  position:relative;transition:background .3s;
  box-shadow:inset 0 2px 6px rgba(0,0,0,.3);
}
.toggle-thumb{
  position:absolute;top:3px;left:3px;width:22px;height:22px;
  background:#fff;border-radius:50%;
  transition:transform .3s cubic-bezier(.4,0,.2,1);
  box-shadow:0 2px 6px rgba(0,0,0,.35);
}
body.light .toggle-track{background:#38bdf8;}
body.light .toggle-thumb{transform:translateX(26px);}
body.light .toggle-icon{transform:rotate(20deg);}
.toggle-label{
  font-size:.85rem;font-weight:700;letter-spacing:.05em;
  color:var(--toggle-color);text-transform:uppercase;
  transition:color .3s;min-width:72px;
}

/* 컨트롤 */
.container{max-width:1400px;margin:auto;padding:30px;}
.controls{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:30px;justify-content:center;align-items:center;}

button,select,input{
  padding:12px 16px;border:none;border-radius:10px;
  background:var(--control-bg);color:var(--control-color);
  cursor:pointer;transition:background .3s,color .3s;
}

/* 대륙 탭 버튼 — 색 통일 */
.rank-btn{
  padding:10px 22px;border-radius:50px;
  background:transparent;
  border:2px solid #334155;
  color:var(--sub);
  font-size:.88rem;font-weight:700;letter-spacing:.03em;
  cursor:pointer;transition:all .22s;
}
body.light .rank-btn{border-color:#cbd5e1;}
.rank-btn:hover{border-color:#38bdf8;color:#38bdf8;}
.rank-btn.active{
  background:linear-gradient(135deg,#38bdf8,#2563eb);
  border-color:transparent;color:#fff;
  box-shadow:0 4px 18px rgba(56,189,248,.4);
}

.section-title{font-size:1.8rem;margin:25px 0;}
.rank-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;}
.card{
  background:var(--card-bg);border-radius:20px;padding:20px;
  box-shadow:0 8px 20px var(--card-shadow);
  transition:background .3s,box-shadow .3s;
}
.rank{font-size:1.3rem;font-weight:bold;color:var(--rank-color);}
.tag{display:inline-block;background:var(--tag-bg);color:#fff;padding:5px 10px;border-radius:20px;margin:10px 0;}
.game-logo{width:100%;height:140px;object-fit:cover;border-radius:15px;margin-bottom:15px;}

/* CTA 배너 */
.cta-section{
  text-align:center;padding:6px 20px;
  background:linear-gradient(135deg,#0f2744,#1e3a5f);
  display:flex;align-items:center;justify-content:center;gap:20px;flex-wrap:wrap;
}
body.light .cta-section{background:linear-gradient(135deg,#dbeafe,#eff6ff);}
.cta-title{font-size:.95rem;font-weight:700;margin:0;}
.cta-sub{color:var(--sub);font-size:.78rem;margin:0;}
.cta-btn{
  display:inline-flex;align-items:center;gap:5px;
  padding:6px 16px;border-radius:50px;border:none;
  background:linear-gradient(135deg,#38bdf8,#2563eb);
  color:#fff;font-size:.78rem;font-weight:700;
  cursor:pointer;letter-spacing:.03em;text-decoration:none;
  transition:opacity .2s,transform .2s;
  box-shadow:0 3px 12px rgba(56,189,248,.4);white-space:nowrap;
}
.cta-btn:hover{opacity:.85;transform:translateY(-2px);}

footer{text-align:center;padding:30px;color:var(--footer-color);}
</style>
</head>
<body>
<header>
  <a class="nav-btn" href="contact.html">🤝 Partnership</a>
  <h1>🎮 GSNS</h1>
  <p class="sub">한국 게임 & 글로벌 게임 실시간 랭킹 플랫폼</p>
  <div class="theme-toggle" onclick="toggleTheme()">
    <span class="toggle-icon" id="toggleIcon">🌙</span>
    <div class="toggle-track"><div class="toggle-thumb"></div></div>
    <span class="toggle-label" id="themeBtn">Dark Mode</span>
  </div>
</header>

<div class="container">
  <div class="controls">
    <button class="rank-btn active" id="btnAsia"   onclick="showRankings('asia')">🌏 아시아</button>
    <button class="rank-btn"        id="btnNA"     onclick="showRankings('na')">🌎 북미</button>
    <button class="rank-btn"        id="btnEurope" onclick="showRankings('europe')">🌍 유럽</button>
    <button class="rank-btn"        id="btnGlobal" onclick="showRankings('global')">🌐 글로벌</button>
    <select id="genreFilter" onchange="filterByGenre()">
      <option value="all">전체 장르</option>
      <option value="MMORPG">MMORPG</option>
      <option value="RPG">RPG</option>
      <option value="FPS">FPS</option>
      <option value="MOBA">MOBA</option>
      <option value="Battle Royale">Battle Royale</option>
      <option value="Sandbox">Sandbox</option>
      <option value="Sports">Sports</option>
      <option value="Action RPG">Action RPG</option>
    </select>
    <input type="text" id="searchInput" placeholder="게임 검색" onkeyup="searchGame()" />
  </div>

  <h2 class="section-title" id="sectionTitle">아시아 TOP 10</h2>
  <div class="rank-grid" id="rankGrid"></div>
</div>

<!-- CTA 배너 -->
<section class="cta-section">
  <h2 class="cta-title">함께 성장할 파트너를 찾고 있나요?</h2>
  <p class="cta-sub">게임사, 브랜드, 콘텐츠 크리에이터 등 다양한 제휴를 환영합니다.</p>
  <a class="cta-btn" href="contact.html">제휴 문의하기 →</a>
</section>

<footer>
  <p>© 2026 GSNS - Game Social Network Service</p>
</footer>

const rankings = {
  asia: [
    {rank:1, name:'League of Legends',   genre:'MOBA',       platform:'PC',        site:'https://www.leagueoflegends.com/ko-kr/'},
    {rank:2, name:'PUBG: Battlegrounds', genre:'Battle Royale',platform:'PC',       site:'https://pubg.com/ko/'},
    {rank:3, name:'Genshin Impact',      genre:'RPG',        platform:'PC/Mobile',  site:'https://genshin.hoyoverse.com/'},

  ],

    {rank:3, name:'Minecraft',           genre:'Sandbox',    platform:'PC/Mobile',  site:'https://www.minecraft.net/'},
    {rank:4, name:'Apex Legends',        genre:'Battle Royale',platform:'PC/Console',site:'https://www.ea.com/games/apex-legends'},
    {rank:5, name:'Counter-Strike 2',   genre:'FPS',        platform:'PC',         site:'https://www.counter-strike.net/cs2'},
    {rank:6, name:'World of Warcraft',   genre:'MMORPG',     platform:'PC',         site:'https://worldofwarcraft.blizzard.com/'},
    {rank:7, name:'Overwatch 2',         genre:'FPS',        platform:'PC/Console', site:'https://overwatch.blizzard.com/'},
    {rank:8, name:'Valorant',            genre:'FPS',        platform:'PC',         site:'https://playvalorant.com/'},
    {rank:9, name:'Diablo IV',           genre:'Action RPG', platform:'PC/Console', site:'https://diablo4.blizzard.com/'},
    {rank:10,name:'Elden Ring',          genre:'RPG',        platform:'PC/Console', site:'https://en.bandainamcoent.eu/elden-ring/'}
  ],
  europe: [
    {rank:1, name:'Counter-Strike 2',   genre:'FPS',        platform:'PC',         site:'https://www.counter-strike.net/cs2'},
    {rank:2, name:'League of Legends',  genre:'MOBA',       platform:'PC',         site:'https://www.leagueoflegends.com/'},
    {rank:3, name:'Minecraft',          genre:'Sandbox',    platform:'PC/Mobile',  site:'https://www.minecraft.net/'},
    {rank:4, name:'Dota 2',             genre:'MOBA',       platform:'PC',         site:'https://www.dota2.com/'},
    {rank:5, name:'World of Warcraft',  genre:'MMORPG',     platform:'PC',         site:'https://worldofwarcraft.blizzard.com/'},
    {rank:6, name:'Fortnite',           genre:'Battle Royale',platform:'PC/Console',site:'https://www.fortnite.com/'},
    {rank:7, name:'Elden Ring',         genre:'RPG',        platform:'PC/Console', site:'https://en.bandainamcoent.eu/elden-ring/'},
    {rank:8, name:'Cyberpunk 2077',     genre:'RPG',        platform:'PC/Console', site:'https://www.cyberpunk.net/'},
    {rank:9, name:'Final Fantasy XIV',  genre:'MMORPG',     platform:'PC',         site:'https://na.finalfantasyxiv.com/'},
    {rank:10,name:'Apex Legends',       genre:'Battle Royale',platform:'PC/Console',site:'https://www.ea.com/games/apex-legends'}
  ],
  global: [
    {rank:1, name:'Minecraft',          genre:'Sandbox',    platform:'PC/Mobile',  site:'https://www.minecraft.net/'},
    {rank:2, name:'Fortnite',           genre:'Battle Royale',platform:'PC/Console',site:'https://www.fortnite.com/'},
    {rank:3, name:'League of Legends',  genre:'MOBA',       platform:'PC',         site:'https://www.leagueoflegends.com/'},
    {rank:4, name:'Counter-Strike 2',  genre:'FPS',        platform:'PC',         site:'https://www.counter-strike.net/cs2'},
    {rank:5, name:'Genshin Impact',     genre:'RPG',        platform:'PC/Mobile',  site:'https://genshin.hoyoverse.com/'},
    {rank:6, name:'Valorant',           genre:'FPS',        platform:'PC',         site:'https://playvalorant.com/'},
    {rank:7, name:'PUBG: Battlegrounds',genre:'Battle Royale',platform:'PC',       site:'https://pubg.com/'},
    {rank:8, name:'Call of Duty',       genre:'FPS',        platform:'PC/Console', site:'https://www.callofduty.com/'},
    {rank:9, name:'World of Warcraft',  genre:'MMORPG',     platform:'PC',         site:'https://worldofwarcraft.blizzard.com/'},
    {rank:10,name:'Apex Legends',       genre:'Battle Royale',platform:'PC/Console',site:'https://www.ea.com/games/apex-legends'}
  ]
};

const titles = {
  asia:'아시아 TOP 10', na:'북미 TOP 10', europe:'유럽 TOP 10', global:'글로벌 TOP 10'
};
const btnIds = {
  asia:'btnAsia', na:'btnNA', europe:'btnEurope', global:'btnGlobal'
};

let currentRegion = 'asia';
let currentList = rankings.asia.map(g=>({...g, logo:logoMap[g.name]||''}));

function renderGames(list){
  const grid = document.getElementById('rankGrid');
  grid.innerHTML = '';
  list.forEach(game=>{
    grid.innerHTML += `
      <div class="card">
        <img src="${game.logo}" class="game-logo" alt="${game.name}" onerror="this.style.display='none'">
        <div class="rank">#${game.rank}</div>
        <div class="tag">${game.genre}</div>
        <h3>${game.name}</h3>
        <p>플랫폼: ${game.platform}</p>
        <button onclick="window.open('${game.site}','_blank')">공식 사이트 이동</button>
      </div>`;
  });
}

function showRankings(region){
  currentRegion = region;
  currentList = rankings[region].map(g=>({...g, logo:logoMap[g.name]||''}));
  document.getElementById('sectionTitle').innerText = titles[region];
  document.querySelectorAll('.rank-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(btnIds[region]).classList.add('active');
  document.getElementById('genreFilter').value = 'all';
  renderGames(currentList);
}

function filterByGenre(){
  const genre = document.getElementById('genreFilter').value;
  const base = rankings[currentRegion].map(g=>({...g, logo:logoMap[g.name]||''}));
  renderGames(genre === 'all' ? base : base.filter(g=>g.genre===genre));
}

function searchGame(){
  const kw = document.getElementById('searchInput').value.toLowerCase();
  const base = rankings[currentRegion].map(g=>({...g, logo:logoMap[g.name]||''}));
  renderGames(base.filter(g=>g.name.toLowerCase().includes(kw)));
}

function toggleTheme(){
  document.body.classList.toggle('light');
  const isLight = document.body.classList.contains('light');
  document.getElementById('toggleIcon').textContent = isLight ? '☀️' : '🌙';
  document.getElementById('themeBtn').textContent   = isLight ? 'Light Mode' : 'Dark Mode';
  localStorage.setItem('theme', isLight ? 'light' : 'dark');
}

window.onload = () => {
  const saved = localStorage.getItem('theme');
  if(saved === 'light'){
    document.body.classList.add('light');
    document.getElementById('toggleIcon').textContent = '☀️';
    document.getElementById('themeBtn').textContent   = 'Light Mode';
  } else {
    document.getElementById('toggleIcon').textContent = '🌙';
    document.getElementById('themeBtn').textContent   = 'Dark Mode';
  }
  renderGames(currentList);
};
</script>
</body>
</html>
