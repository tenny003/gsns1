<title>GSNS - Game Ranking Platform</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}

:root{
  --bg:#0f172a;--header-bg:#111827;--text:#e2e8f0;--sub:#94a3b8;
  --control-bg:#1e293b;--control-color:#ffffff;
  --card-bg:linear-gradient(180deg,#1e293b,#111827);
  --card-shadow:rgba(0,0,0,.35);--rank-color:#38bdf8;
  --tag-bg:#2563eb;--footer-color:#94a3b8;--toggle-color:#f8fafc;
  --border:#334155;
}
body.light{
  --bg:#f1f5f9;--header-bg:#ffffff;--text:#1e293b;--sub:#64748b;
  --control-bg:#e2e8f0;--control-color:#1e293b;
  --card-bg:linear-gradient(180deg,#ffffff,#f1f5f9);
  --card-shadow:rgba(0,0,0,.10);--rank-color:#2563eb;
  --tag-bg:#3b82f6;--footer-color:#64748b;--toggle-color:#1e293b;
  --border:#cbd5e1;
}

body{background:var(--bg);color:var(--text);transition:background .3s,color .3s;}

/* 헤더 */
header{
  padding:28px 40px;text-align:center;background:var(--header-bg);
  position:sticky;top:0;z-index:10;
  transition:background .3s;box-shadow:0 2px 10px rgba(0,0,0,.15);
}
h1{font-size:2.5rem;}
.sub-text{color:var(--sub);margin-top:8px;}
.nav-btn{
  position:absolute;left:30px;top:50%;transform:translateY(-50%);
  padding:10px 22px;border-radius:50px;border:none;
  background:linear-gradient(135deg,#38bdf8,#2563eb);
  color:#fff;font-size:.85rem;font-weight:700;cursor:pointer;
  letter-spacing:.04em;transition:opacity .2s,transform .2s;
  box-shadow:0 4px 16px rgba(56,189,248,.35);
  text-decoration:none;display:flex;align-items:center;gap:6px;
}
.nav-btn:hover{opacity:.85;transform:translateY(calc(-50% - 2px));}

/* 테마 토글 */
.theme-toggle{
  position:absolute;right:30px;top:50%;transform:translateY(-50%);
  display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;
}
.toggle-icon{font-size:1.2rem;transition:transform .4s;}
.toggle-track{
  width:54px;height:28px;background:#475569;border-radius:50px;
  position:relative;transition:background .3s;
  box-shadow:inset 0 2px 6px rgba(0,0,0,.3);
}
.toggle-thumb{
  position:absolute;top:3px;left:3px;width:22px;height:22px;
  background:#fff;border-radius:50%;
  transition:transform .3s cubic-bezier(.4,0,.2,1);
  box-shadow:0 2px 6px rgba(0,0,0,.35);
}
body.light .toggle-track{background:#38bdf8;}
body.light .toggle-thumb{transform:translateX(26px);}
body.light .toggle-icon{transform:rotate(20deg);}
.toggle-label{
  font-size:.85rem;font-weight:700;letter-spacing:.05em;
  color:var(--toggle-color);text-transform:uppercase;
  transition:color .3s;min-width:72px;
}

/* 컨테이너 */
.container{max-width:1400px;margin:auto;padding:30px 30px 0;}

/* 탭 공통 스타일 */
.tab-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:14px;}
.tab-btn{
  padding:10px 22px;border-radius:50px;
  background:transparent;border:2px solid var(--border);
  color:var(--sub);font-size:.88rem;font-weight:700;
  letter-spacing:.03em;cursor:pointer;transition:all .22s;
}
.tab-btn:hover{border-color:#38bdf8;color:#38bdf8;}
.tab-btn.active{
  background:linear-gradient(135deg,#38bdf8,#2563eb);
  border-color:transparent;color:#fff;
  box-shadow:0 4px 18px rgba(56,189,248,.4);
}

/* 검색 */
.search-row{display:flex;justify-content:center;margin-bottom:28px;}
.search-row input{
  width:100%;max-width:400px;padding:11px 18px;
  border-radius:50px;border:2px solid var(--border);
  background:var(--control-bg);color:var(--control-color);
  font-size:.9rem;outline:none;transition:border-color .2s,background .3s;
}
.search-row input:focus{border-color:#38bdf8;}

/* 구분선 */
.divider{height:1px;background:var(--border);margin:0 0 28px;opacity:.5;}

.section-title{font-size:1.8rem;margin-bottom:20px;}
.rank-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:20px;padding-bottom:40px;
}
.card{
  background:var(--card-bg);border-radius:20px;padding:20px;
  box-shadow:0 8px 20px var(--card-shadow);
  transition:background .3s,box-shadow .3s,transform .2s;
}
.card:hover{transform:translateY(-4px);}
.rank{font-size:1.3rem;font-weight:bold;color:var(--rank-color);}
.tag{display:inline-block;background:var(--tag-bg);color:#fff;padding:4px 12px;border-radius:20px;margin:8px 0;font-size:.82rem;}
.img-wrap{
  position:relative;width:100%;height:140px;border-radius:14px;
  overflow:hidden;margin-bottom:14px;
  background:linear-gradient(135deg,#0c1628,#1a2744);
  display:flex;align-items:center;justify-content:center;
}
.game-logo{
  max-width:78%;max-height:78%;
  object-fit:contain;display:block;
  filter:drop-shadow(0 2px 10px rgba(0,0,0,.6));
}
.img-fallback{
  position:absolute;inset:0;display:none;
  align-items:center;justify-content:center;flex-direction:column;gap:6px;
}
.img-fallback .fi{font-size:2.8rem;font-weight:900;color:#38bdf8;line-height:1;}
.img-fallback .fn{font-size:.7rem;font-weight:700;color:#94a3b8;text-align:center;padding:0 8px;}
.card h3{font-size:1rem;margin-bottom:6px;}
.card p{font-size:.83rem;color:var(--sub);margin-bottom:12px;}
.site-btn{
  width:100%;padding:9px;border-radius:10px;border:none;
  background:var(--control-bg);color:var(--control-color);
  font-size:.83rem;font-weight:600;cursor:pointer;
  transition:background .2s,color .2s;
}
.site-btn:hover{background:#2563eb;color:#fff;}

/* CTA 배너 */
.cta-section{
  text-align:center;padding:6px 20px;
  background:linear-gradient(135deg,#0f2744,#1e3a5f);
  display:flex;align-items:center;justify-content:center;gap:20px;flex-wrap:wrap;
}
body.light .cta-section{background:linear-gradient(135deg,#dbeafe,#eff6ff);}
.cta-title{font-size:.95rem;font-weight:700;margin:0;}
.cta-sub{color:var(--sub);font-size:.78rem;margin:0;}
.cta-btn{
  display:inline-flex;align-items:center;gap:5px;
  padding:6px 16px;border-radius:50px;border:none;
  background:linear-gradient(135deg,#38bdf8,#2563eb);
  color:#fff;font-size:.78rem;font-weight:700;
  cursor:pointer;text-decoration:none;
  transition:opacity .2s,transform .2s;
  box-shadow:0 3px 12px rgba(56,189,248,.4);white-space:nowrap;
}
.cta-btn:hover{opacity:.85;transform:translateY(-2px);}

footer{text-align:center;padding:30px;color:var(--footer-color);}
</style>

const continentLabels = {asia:'아시아',na:'북미',europe:'유럽',global:'글로벌'};
let currentContinent = 'asia';
let currentGenre = 'TOP 10';

function renderGames(list) {
  const grid = document.getElementById('rankGrid');
  grid.innerHTML = '';
  if(!list || list.length === 0){
    grid.innerHTML = '<p style="color:var(--sub);padding:20px">해당 장르의 게임 데이터가 없습니다.</p>';
    return;
  }
  list.forEach((game, i) => {
    const initials = game.name.split(/\s+/).map(w=>w[0]).join('').slice(0,3).toUpperCase();
    grid.innerHTML += `
      <div class="card">
        <div class="img-wrap">
          <img src="${game.logo}" class="game-logo" alt="${game.name}"
            onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
          <div class="img-fallback">
            <div class="fi">${initials}</div>
            <div class="fn">${game.name}</div>
          </div>
        </div>
        <div class="rank">#${i + 1}</div>
        <div class="tag">${game.genre}</div>
        <h3>${game.name}</h3>
        <p>플랫폼: ${game.platform}</p>
        <button class="site-btn" onclick="window.open('${game.site}','_blank')">공식 사이트 이동</button>
      </div>`;
  });
}

function updateGenreTabs() {
  const genres = Object.keys(gameData[currentContinent]);
  const container = document.getElementById('genreTabs');
  container.innerHTML = genres.map(g =>
    `<button class="tab-btn${g === currentGenre ? ' active' : ''}" onclick="setGenre('${g}')">${g === 'TOP 10' ? '🏆 TOP 10' : g}</button>`
  ).join('');
}

function updateSectionTitle() {
  const emoji = {asia:'🌏',na:'🌎',europe:'🌍',global:'🌐'};
  document.getElementById('sectionTitle').textContent =
    `${emoji[currentContinent]} ${continentLabels[currentContinent]} — ${currentGenre}`;
}

function setContinent(region) {
  currentContinent = region;
  const genres = Object.keys(gameData[region]);
  currentGenre = genres.includes(currentGenre) ? currentGenre : 'TOP 10';

  document.querySelectorAll('#continentTabs .tab-btn').forEach((b, i) => {
    b.classList.toggle('active', ['asia','na','europe','global'][i] === region);
  });

  document.getElementById('searchInput').value = '';
  updateGenreTabs();
  updateSectionTitle();
  renderGames(gameData[currentContinent][currentGenre]);
}

function setGenre(genre) {
  currentGenre = genre;
  updateGenreTabs();
  updateSectionTitle();
  document.getElementById('searchInput').value = '';
  renderGames(gameData[currentContinent][currentGenre]);
}

function searchGame() {
  const kw = document.getElementById('searchInput').value.toLowerCase();
  const base = gameData[currentContinent][currentGenre];
  renderGames(kw ? base.filter(g => g.name.toLowerCase().includes(kw)) : base);
}

function toggleTheme() {
  document.body.classList.toggle('light');
  const isLight = document.body.classList.contains('light');
  document.getElementById('toggleIcon').textContent = isLight ? '☀️' : '🌙';
  document.getElementById('themeBtn').textContent   = isLight ? 'Light Mode' : 'Dark Mode';
  localStorage.setItem('theme', isLight ? 'light' : 'dark');
}

window.onload = () => {
  const saved = localStorage.getItem('theme');
  if (saved === 'light') {
    document.body.classList.add('light');
    document.getElementById('toggleIcon').textContent = '☀️';
    document.getElementById('themeBtn').textContent   = 'Light Mode';
  } else {
    document.getElementById('toggleIcon').textContent = '🌙';
    document.getElementById('themeBtn').textContent   = 'Dark Mode';
  }
  updateGenreTabs();
  updateSectionTitle();
  renderGames(gameData[currentContinent][currentGenre]);
};
</script>
