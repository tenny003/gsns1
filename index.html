<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GSNS - Game Ranking Platform</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}

/* 다크 모드 (기본) */
:root{
  --bg:#0f172a;
  --header-bg:#111827;
  --text:#e2e8f0;
  --sub:#94a3b8;
  --control-bg:#1e293b;
  --control-color:#ffffff;
  --card-bg:linear-gradient(180deg,#1e293b,#111827);
  --card-shadow:rgba(0,0,0,.35);
  --rank-color:#38bdf8;
  --tag-bg:#2563eb;
  --footer-color:#94a3b8;
  --toggle-bg:#334155;
  --toggle-color:#f8fafc;
}

/* 라이트 모드 */
body.light{
  --bg:#f1f5f9;
  --header-bg:#ffffff;
  --text:#1e293b;
  --sub:#64748b;
  --control-bg:#e2e8f0;
  --control-color:#1e293b;
  --card-bg:linear-gradient(180deg,#ffffff,#f1f5f9);
  --card-shadow:rgba(0,0,0,.10);
  --rank-color:#2563eb;
  --tag-bg:#3b82f6;
  --footer-color:#64748b;
  --toggle-bg:#e2e8f0;
  --toggle-color:#1e293b;
}

body{background:var(--bg);color:var(--text);transition:background .3s,color .3s;}
header{padding:40px;text-align:center;background:var(--header-bg);position:sticky;top:0;z-index:10;transition:background .3s;box-shadow:0 2px 10px rgba(0,0,0,.15);}
h1{font-size:2.5rem;}
.sub{color:var(--sub);margin-top:10px;}
.container{max-width:1400px;margin:auto;padding:30px;}
.controls{display:flex;gap:15px;flex-wrap:wrap;margin-bottom:30px;justify-content:center;}
button,select,input{
  padding:12px 16px;border:none;border-radius:10px;
  background:var(--control-bg);color:var(--control-color);cursor:pointer;transition:background .3s,color .3s;
}
.section-title{font-size:1.8rem;margin:25px 0;}
.rank-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;}
.card{
  background:var(--card-bg);
  border-radius:20px;padding:20px;
  box-shadow:0 8px 20px var(--card-shadow);
  transition:background .3s,box-shadow .3s;
}
.rank{font-size:1.3rem;font-weight:bold;color:var(--rank-color);}
.tag{display:inline-block;background:var(--tag-bg);color:#fff;padding:5px 10px;border-radius:20px;margin:10px 0;}
.game-logo{
  width:100%;
  height:140px;
  object-fit:cover;
  border-radius:15px;
  margin-bottom:15px;
}
footer{text-align:center;padding:30px;color:var(--footer-color);}

/* 제휴 문의 폼 */
.contact-section{background:var(--header-bg);padding:60px 0;transition:background .3s;}
.contact-sub{color:var(--sub);margin-bottom:35px;font-size:1rem;}
.contact-form{
  max-width:720px;margin:0 auto;
  display:flex;flex-direction:column;gap:20px;
}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
@media(max-width:600px){.form-row{grid-template-columns:1fr;}}
.form-group{display:flex;flex-direction:column;gap:8px;}
.form-group label{font-size:.85rem;font-weight:600;color:var(--sub);letter-spacing:.04em;text-transform:uppercase;}
.contact-form input,
.contact-form select,
.contact-form textarea{
  padding:14px 16px;border-radius:12px;border:1.5px solid transparent;
  background:var(--control-bg);color:var(--control-color);
  font-size:.95rem;transition:border-color .2s,background .3s;
  outline:none;resize:vertical;
}
.contact-form input:focus,
.contact-form select:focus,
.contact-form textarea:focus{border-color:#38bdf8;}
.submit-btn{
  align-self:flex-start;
  padding:14px 36px;border-radius:50px;border:none;
  background:linear-gradient(135deg,#38bdf8,#2563eb);
  color:#fff;font-size:1rem;font-weight:700;
  cursor:pointer;letter-spacing:.03em;
  transition:opacity .2s,transform .2s;
  box-shadow:0 4px 20px rgba(56,189,248,.35);
}
.submit-btn:hover{opacity:.88;transform:translateY(-2px);}

/* 테마 토글 */
header{position:relative;}
.theme-toggle{
  position:absolute;right:30px;top:50%;transform:translateY(-50%);
  display:flex;align-items:center;gap:10px;
  cursor:pointer;user-select:none;
}
.toggle-icon{font-size:1.2rem;transition:transform .4s;}
.toggle-track{
  width:54px;height:28px;
  background:#475569;
  border-radius:50px;
  position:relative;
  transition:background .3s;
  box-shadow:inset 0 2px 6px rgba(0,0,0,.3);
}
.toggle-thumb{
  position:absolute;top:3px;left:3px;
  width:22px;height:22px;
  background:#fff;
  border-radius:50%;
  transition:transform .3s cubic-bezier(.4,0,.2,1);
  box-shadow:0 2px 6px rgba(0,0,0,.35);
}
body.light .toggle-track{background:#38bdf8;}
body.light .toggle-thumb{transform:translateX(26px);}
body.light .toggle-icon{transform:rotate(20deg);}
.toggle-label{
  font-size:.85rem;font-weight:700;letter-spacing:.05em;
  color:var(--toggle-color);text-transform:uppercase;
  transition:color .3s;min-width:72px;
}
</style>
</head>
<body>
<header>
  <h1>🎮 GSNS</h1>
  <p class="sub">한국 게임 & 글로벌 게임 실시간 랭킹 플랫폼</p>
  <div class="theme-toggle" onclick="toggleTheme()">
    <span class="toggle-icon" id="toggleIcon">🌙</span>
    <div class="toggle-track"><div class="toggle-thumb"></div></div>
    <span class="toggle-label" id="themeBtn">Dark Mode</span>
  </div>
</header>

<div class="container">
  <div class="controls">
    <button onclick="showKoreanRankings()">한국 TOP10</button>
    <button onclick="showGlobalRankings()">글로벌 TOP10</button>
    <select id="genreFilter" onchange="filterByGenre()">
      <option value="all">전체 장르</option>
      <option value="MMORPG">MMORPG</option>
      <option value="RPG">RPG</option>
      <option value="FPS">FPS</option>
      <option value="MOBA">MOBA</option>
      <option value="Battle Royale">Battle Royale</option>
    </select>
    <input type="text" id="searchInput" placeholder="게임 검색" onkeyup="searchGame()" />
  </div>

  <h2 class="section-title" id="sectionTitle">현재 랭킹</h2>
  <div class="rank-grid" id="rankGrid"></div>
</div>

<!-- 제휴 문의 섹션 -->
<section class="contact-section">
  <div class="container">
    <h2 class="section-title">Partnership Inquiry</h2>
    <p class="contact-sub">게임사 및 브랜드 제휴 문의를 남겨주세요. 빠르게 검토 후 연락드립니다.</p>
    <form class="contact-form" action="https://formspree.io/f/xzdorzoj" method="POST">
      <div class="form-row">
        <div class="form-group">
          <label>이름 / Name</label>
          <input type="text" name="name" placeholder="홍길동" required />
        </div>
        <div class="form-group">
          <label>이메일 / Email</label>
          <input type="email" name="email" placeholder="example@email.com" required />
        </div>
      </div>
      <div class="form-group">
        <label>회사명 / Company</label>
        <input type="text" name="company" placeholder="회사명을 입력해주세요" />
      </div>
      <div class="form-group">
        <label>문의 유형 / Type</label>
        <select name="type">
          <option value="게임사 제휴">게임사 제휴</option>
          <option value="광고 문의">광고 문의</option>
          <option value="콘텐츠 협업">콘텐츠 협업</option>
          <option value="기타">기타</option>
        </select>
      </div>
      <div class="form-group">
        <label>문의 내용 / Message</label>
        <textarea name="message" rows="5" placeholder="문의 내용을 자유롭게 작성해주세요." required></textarea>
      </div>
      <button type="submit" class="submit-btn">문의 보내기 →</button>
    </form>
  </div>
</section>

<footer>
  <p>© 2026 GSNS - Game Social Network Service</p>
</footer>

<script>
let koreanGames = [
  {
    rank:1,
    name:'League of Legends',
    genre:'MOBA',
    platform:'PC',
    site:'https://www.leagueoflegends.com/ko-kr/',
    logo:logoMap['League of Legends']
  },
  {
    rank:2,
    name:'FC Online',
    genre:'Sports',
    platform:'PC',
    site:'https://fconline.nexon.com/',
    logo:logoMap['FC Online']
  },
  {
    rank:3,
    name:'PUBG: Battlegrounds',
    genre:'Battle Royale',
    platform:'PC',
    site:'https://pubg.com/ko/',
    logo:logoMap['PUBG: Battlegrounds']
  },
  {
    rank:4,
    name:'Valorant',
    genre:'FPS',
    platform:'PC',
    site:'https://playvalorant.com/ko-kr/',
    logo:logoMap['Valorant']
  },
  {
    rank:5,
    name:'MapleStory',
    genre:'RPG',
    platform:'PC',
    site:'https://maplestory.nexon.com/',
    logo:logoMap['MapleStory']
  },
  {
    rank:6,
    name:'Lost Ark',
    genre:'MMORPG',
    platform:'PC',
    site:'https://lostark.game.onstove.com/',
    logo:logoMap['Lost Ark']
  },
  {
    rank:7,
    name:'Sudden Attack',
    genre:'FPS',
    platform:'PC',
    site:'https://sa.nexon.com/',
    logo:logoMap['Sudden Attack']
  },
  {
    rank:8,
    name:'Dungeon & Fighter',
    genre:'Action RPG',
    platform:'PC',
    site:'https://df.nexon.com/',
    logo:logoMap['Dungeon & Fighter']
  },
  {
    rank:9,
    name:'Lineage',
    genre:'MMORPG',
    platform:'PC',
    site:'https://lineage.plaync.com/',
    logo:logoMap['Lineage']
  },
  {
    rank:10,
    name:'Overwatch 2',
    genre:'FPS',
    platform:'PC',
    site:'https://overwatch.blizzard.com/ko-kr/',
    logo:logoMap['Overwatch 2']
  }
];

const logoMap = {
  "League of Legends":"https://wiki.leagueoflegends.com/en-us/images/League_of_Legends_logo.png",
  "PUBG: Battlegrounds":"https://press.krafton.com/files/Logo-PUBG-Battlegrounds.png",
  "Valorant":"https://upload.wikimedia.org/wikipedia/commons/f/fc/Valorant_logo_-_pink_color_version.svg",
  "FC Online":"https://ssl.nexon.com/s2/game/fconline/renewal/common/logo.png",
  "MapleStory":"https://upload.wikimedia.org/wikipedia/en/7/77/MapleStory_Logo.png",
  "Lost Ark":"https://upload.wikimedia.org/wikipedia/en/6/62/Lost_Ark_logo.png",
  "Sudden Attack":"https://ssl.nexon.com/s2/game/sa/main/logo.png",
  "Dungeon & Fighter":"https://upload.wikimedia.org/wikipedia/en/e/e1/Dungeon_Fighter_Online_logo.png",
  "Lineage":"https://upload.wikimedia.org/wikipedia/en/2/24/Lineage_logo.png",
  "Overwatch 2":"https://upload.wikimedia.org/wikipedia/commons/5/55/Overwatch_2_logo.svg",
  "Fortnite":"https://upload.wikimedia.org/wikipedia/commons/0/09/Fortnite_logo.svg",
  "Minecraft":"https://upload.wikimedia.org/wikipedia/commons/5/51/Minecraft_logo.svg",
  "Call of Duty":"https://upload.wikimedia.org/wikipedia/commons/1/15/Call_of_Duty_logo.svg",
  "Elden Ring":"https://upload.wikimedia.org/wikipedia/en/b/b9/Elden_Ring_Box_art.jpg",
  "World of Warcraft":"https://upload.wikimedia.org/wikipedia/en/6/65/World_of_Warcraft_logo.svg",
  "Counter-Strike 2":"https://upload.wikimedia.org/wikipedia/commons/8/8e/Counter-Strike_2_logo.svg",
  "Genshin Impact":"https://upload.wikimedia.org/wikipedia/en/5/5d/Genshin_Impact_logo.svg",
  "Dota 2":"https://upload.wikimedia.org/wikipedia/en/3/31/Dota_2_Symbol.png",
  "Final Fantasy XIV":"https://upload.wikimedia.org/wikipedia/en/9/9d/Final_Fantasy_XIV_Logo.png",
  "Apex Legends":"https://upload.wikimedia.org/wikipedia/commons/d/db/Apex_legends_logo.svg"
};

async function fetchKoreanRankings() {
  try {
    const response = await fetch('https://your-api-url.com/korea-top10');
    const data = await response.json();

    koreanGames = data.map((game, index) => ({
      rank: index + 1,
      name: game.name,
      genre: game.genre,
      platform: game.platform,
      site: game.site || '#',
      logo: logoMap[game.name] || 'https://via.placeholder.com/400x200'
    }));

    currentList = [...koreanGames];
    document.getElementById('sectionTitle').innerText = '한국 게임 실시간 TOP10';
    renderGames(currentList);
  } catch (error) {
    koreanGames = [
      {
        rank:1,
        name:'League of Legends',
        genre:'MOBA',
        platform:'PC',
        site:'https://www.leagueoflegends.com/ko-kr/',
        logo:'https://cdn.cloudflare.steamstatic.com/steam/apps/1818750/header.jpg'
      },
      {
        rank:2,
        name:'FC Online',
        genre:'Sports',
        platform:'PC',
        site:'https://fconline.nexon.com/',
        logo:'https://ssl.nexon.com/s2/game/fconline/renewal/common/share.jpg'
      },
      {
        rank:3,
        name:'PUBG: Battlegrounds',
        genre:'Battle Royale',
        platform:'PC',
        site:'https://pubg.com/ko/',
        logo:'https://cdn.cloudflare.steamstatic.com/steam/apps/578080/header.jpg'
      }
    ];

    currentList = [...koreanGames];
    renderGames(currentList);
  }
}

const globalGames = [
  {rank:1,name:'Fortnite',genre:'Battle Royale',platform:'PC/Console',site:'https://www.fortnite.com/',logo:logoMap['Fortnite']},
  {rank:2,name:'Minecraft',genre:'Sandbox',platform:'PC/Mobile',site:'https://www.minecraft.net/',logo:logoMap['Minecraft']},
  {rank:3,name:'Call of Duty',genre:'FPS',platform:'PC/Console',site:'https://www.callofduty.com/',logo:logoMap['Call of Duty']},
  {rank:4,name:'Elden Ring',genre:'RPG',platform:'PC/Console',site:'https://en.bandainamcoent.eu/elden-ring/',logo:logoMap['Elden Ring']},
  {rank:5,name:'World of Warcraft',genre:'MMORPG',platform:'PC',site:'https://worldofwarcraft.blizzard.com/',logo:logoMap['World of Warcraft']},
  {rank:6,name:'Counter-Strike 2',genre:'FPS',platform:'PC',site:'https://www.counter-strike.net/cs2',logo:logoMap['Counter-Strike 2']},
  {rank:7,name:'Genshin Impact',genre:'RPG',platform:'PC/Mobile',site:'https://genshin.hoyoverse.com/',logo:logoMap['Genshin Impact']},
  {rank:8,name:'Dota 2',genre:'MOBA',platform:'PC',site:'https://www.dota2.com/',logo:logoMap['Dota 2']},
  {rank:9,name:'Final Fantasy XIV',genre:'MMORPG',platform:'PC',site:'https://na.finalfantasyxiv.com/',logo:logoMap['Final Fantasy XIV']},
  {rank:10,name:'Apex Legends',genre:'Battle Royale',platform:'PC/Console',site:'https://www.ea.com/games/apex-legends',logo:logoMap['Apex Legends']}
];

let currentList = [...koreanGames];

function renderGames(list){
  const grid = document.getElementById('rankGrid');
  grid.innerHTML='';

  list.forEach(game=>{
    grid.innerHTML += `
      <div class="card">
        <img src="${game.logo}" class="game-logo" alt="${game.name}">
        <div class="rank">#${game.rank}</div>
        <div class="tag">${game.genre}</div>
        <h3>${game.name}</h3>
        <p>플랫폼: ${game.platform}</p>
        <button onclick="window.open('${game.site}','_blank')">공식 사이트 이동</button>
      </div>
    `;
  });
}

function showKoreanRankings(){
  currentList = [...koreanGames];
  document.getElementById('sectionTitle').innerText='한국 게임 TOP10';
  renderGames(currentList);
}

function showGlobalRankings(){
  currentList = [...globalGames];
  document.getElementById('sectionTitle').innerText='글로벌 게임 TOP10';
  renderGames(currentList);
}

function filterByGenre(){
  const genre=document.getElementById('genreFilter').value;
  if(genre==='all') return renderGames(currentList);
  renderGames(currentList.filter(game=>game.genre===genre));
}

function searchGame(){
  const keyword=document.getElementById('searchInput').value.toLowerCase();
  renderGames(currentList.filter(game=>game.name.toLowerCase().includes(keyword)));
}

function toggleTheme(){
  const body = document.body;
  body.classList.toggle('light');
  const isLight = body.classList.contains('light');
  document.getElementById('toggleIcon').textContent = isLight ? '☀️' : '🌙';
  document.getElementById('themeBtn').textContent = isLight ? 'Light Mode' : 'Dark Mode';
  localStorage.setItem('theme', isLight ? 'light' : 'dark');
}

window.onload = () => {
  const saved = localStorage.getItem('theme');
  if(saved === 'light'){
    document.body.classList.add('light');
    document.getElementById('toggleIcon').textContent = '☀️';
    document.getElementById('themeBtn').textContent = 'Light Mode';
  } else {
    document.getElementById('toggleIcon').textContent = '🌙';
    document.getElementById('themeBtn').textContent = 'Dark Mode';
  }
  renderGames(currentList);
  fetchKoreanRankings();
};

setInterval(fetchKoreanRankings, 300000);
</script>
</body>
</html>
